
steps:
  # 1. 安装依赖并执行构建
  - name: 'node:20'
    entrypoint: 'npm'
    args: ['install']
  
  - name: 'node:20'
    entrypoint: 'npm'
    args: ['run', 'build']
    env:
      # 这里将云端的代换变量映射给 Vite
      - 'VITE_DATABASE_URL=${_VITE_DATABASE_URL}'

  # 2. 构建 Docker 镜像 (假设您使用的是默认的容器化部署)
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'gcr.io/$PROJECT_ID/zhishitong-portal:$COMMIT_SHA', '.']

  # 3. 推送镜像
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/zhishitong-portal:$COMMIT_SHA']

  # 4. 部署到 Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'zhishitong-learning-tools-portal'
      - '--image'
      - 'gcr.io/$PROJECT_ID/zhishitong-portal:$COMMIT_SHA'
      - '--region'
      - 'us-west1'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'

# 在这里定义刚才在 UI 里填写的变量
substitutions:
  _VITE_DATABASE_URL: '默认值(或留空)'

options:
  logging: CLOUD_LOGGING_ONLY
