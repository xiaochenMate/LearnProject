<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>移动端手写签名板</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 0; padding: 20px; box-sizing: border-box;
            background-color: #f5f5f5; display: flex;
            flex-direction: column; align-items: center; height: 100vh;
        }
        .canvas-container {
            width: 100%; max-width: 500px; height: 500px;
            background-color: #999; position: relative; overflow: hidden;
        }
        canvas {
            display: block; width: 100%; height: 100%;
            touch-action: none; cursor: crosshair;
        }
        .btn-group { margin-top: 25px; display: flex; gap: 10px; }
        button {
            padding: 12px 16px; font-size: 16px; border: none;
            border-radius: 6px; cursor: pointer; font-weight: bold;
        }
        .btn-close { background-color: #8c8c8c; color: white; }
        .btn-clear { background-color: #ff4d4f; color: white; }
        .btn-save { background-color: #52c41a; color: white; }
    </style>
</head>
<body>

    <div class="canvas-container">
        <canvas id="signatureCanvas"></canvas>
    </div>

    <div class="btn-group">
        <button class="btn-close" id="closeBtn">关闭</button>
        <button class="btn-clear" id="clearBtn">清除</button>
        <button class="btn-save" id="saveBtn">保存</button>
    </div>

    <script>
        const canvas = document.getElementById('signatureCanvas');
        const ctx = canvas.getContext('2d');
        const closeBtn = document.getElementById('closeBtn');
        const clearBtn = document.getElementById('clearBtn');
        const saveBtn = document.getElementById('saveBtn');
        let recoPoints = [];
        let isDrawing = false;

        function initCanvas() {
            const container = canvas.parentElement;
            const dpr = window.devicePixelRatio || 1;
            canvas.width = container.clientWidth * dpr;
            canvas.height = container.clientHeight * dpr;
            ctx.scale(dpr, dpr);
            ctx.lineCap = 'round';
            ctx.lineJoin = 'round';
            ctx.lineWidth = 3;
            ctx.strokeStyle = '#000000';
        }

        window.addEventListener('resize', initCanvas);
        initCanvas();

        function getCoordinates(e) {
            const clientX = e.changedTouches ? e.changedTouches[0].clientX : e.clientX;
            const clientY = e.changedTouches ? e.changedTouches[0].clientY : e.clientY;
            const rect = canvas.getBoundingClientRect();
            let x = clientX - rect.left;
            let y = clientY - rect.top;
            x = Math.max(0, Math.min(x, rect.width));
            y = Math.max(0, Math.min(y, rect.height));
            recoPoints.push(x, y);
            return { x, y };
        }

        function startDrawing(e) {
            isDrawing = true;
            const pos = getCoordinates(e);
            ctx.beginPath();
            ctx.moveTo(pos.x, pos.y);
        }

        function draw(e) {
            if (!isDrawing) return;
            e.preventDefault();
            const pos = getCoordinates(e);
            ctx.lineTo(pos.x, pos.y);
            ctx.stroke();
        }

        function stopDrawing() {
            isDrawing = false;
            recoPoints.push(-1, 0);
        }

        canvas.addEventListener('touchstart', startDrawing, { passive: false });
        canvas.addEventListener('touchmove', draw, { passive: false });
        canvas.addEventListener('touchend', stopDrawing);
        canvas.addEventListener('mousedown', startDrawing);
        canvas.addEventListener('mousemove', draw);
        canvas.addEventListener('mouseup', stopDrawing);

        closeBtn.addEventListener('click', () => { window.history.back(); });
        clearBtn.addEventListener('click', () => { 
            ctx.clearRect(0, 0, canvas.width, canvas.height); 
            recoPoints = []; 
        });
        saveBtn.addEventListener('click', () => {
            alert('保存功能可在小程序端通过 postMessage 或生成图片长按实现');
            console.log('签名轨迹:', recoPoints);
        });
    </script>
</body>
</html>
