<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>数字签名申请</title>
    <script src="./signature_pad.umd.js"></script>
    <style>
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background-color: #f2f2f2; display: flex; flex-direction: column; overflow: hidden;
        }
        .header { display: flex; align-items: center; padding: 12px 20px; color: #666; font-size: 14px; }
        .back-btn { font-size: 18px; margin-right: 10px; cursor: pointer; color: #333; font-weight: bold; }
        .notice-text { font-size: 13px; }
        .canvas-wrapper {
            flex: 1; margin: 0 20px; background-color: #4c514e; position: relative; border-radius: 4px;
        }
        .placeholder {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            color: rgba(255, 255, 255, 0.4); font-size: 24px; font-weight: bold; pointer-events: none; transition: opacity 0.3s;
        }
        canvas { display: block; width: 100%; height: 100%; touch-action: none; cursor: crosshair; }
        .footer { display: flex; padding: 15px 20px; gap: 15px; justify-content: flex-start; }
        button { padding: 12px 30px; font-size: 16px; border-radius: 4px; cursor: pointer; font-weight: bold; border: none; }
        .btn-clear { background-color: #fff; color: #555; border: 1px solid #ccc; }
        .btn-submit { background-color: #4c514e; color: #fff; }
    </style>
</head>
<body>

    <div class="header">
        <span class="back-btn" id="closeBtn">&lt;</span>
        <span class="notice-text">*维达,您正在通过工行数字签名进行个人贷款申请</span>
    </div>

    <div class="canvas-wrapper">
        <div class="placeholder" id="placeholder">请在框内签名，确保字迹清晰</div>
        <!-- 这是用户看到的深色透明画板 -->
        <canvas id="signatureCanvas"></canvas>
    </div>

    <div class="footer">
        <button class="btn-clear" id="clearBtn">重签</button>
        <button class="btn-submit" id="saveBtn">提交</button>
    </div>

    <script>
        const canvas = document.getElementById('signatureCanvas');
        const placeholder = document.getElementById('placeholder');
        const ratio = Math.max(window.devicePixelRatio || 1, 1);

        function resizeCanvas() {
            canvas.width = canvas.offsetWidth * ratio;
            canvas.height = canvas.offsetHeight * ratio;
            canvas.getContext("2d").scale(ratio, ratio);
        }
        window.addEventListener("resize", resizeCanvas);
        resizeCanvas();

        // 用户界面：透明底 + 白笔迹
        const signaturePad = new SignaturePad(canvas, {
            backgroundColor: 'rgba(0,0,0,0)', 
            penColor: 'rgb(255, 255, 255)',  
            minWidth: 1.5, maxWidth: 3.5 
        });

        const hidePlaceholder = () => { placeholder.style.opacity = '0'; };
        canvas.addEventListener('touchstart', hidePlaceholder);
        canvas.addEventListener('mousedown', hidePlaceholder);

        document.getElementById('clearBtn').addEventListener('click', () => {
            signaturePad.clear();
            placeholder.style.opacity = '1';
        });

        document.getElementById('closeBtn').addEventListener('click', () => { window.history.back(); });

        // --- 核心转换与提交逻辑 ---
        document.getElementById('saveBtn').addEventListener('click', () => {
            if (signaturePad.isEmpty()) return alert("请在框内签名后再提交！");

            // 1. 获取原轨迹数据
            const pointData = signaturePad.toData();

            // 2. 创建一个离屏 Canvas，用于画【白底黑字】
            const tempCanvas = document.createElement('canvas');
            tempCanvas.width = canvas.width;
            tempCanvas.height = canvas.height;
            tempCanvas.getContext('2d').scale(ratio, ratio);

            const tempPad = new SignaturePad(tempCanvas, {
                backgroundColor: 'rgb(255, 255, 255)', // 强制白底
                penColor: 'rgb(0, 0, 0)',             // 强制黑字
                minWidth: 1.5, maxWidth: 3.5 
            });
            tempPad.fromData(pointData); // 把轨迹重绘在白底黑字画板上

            // 3. 创建最终 Canvas，用于【横屏转竖屏 (顺时针旋转90度)】
            const finalCanvas = document.createElement('canvas');
            // 宽高互换
            finalCanvas.width = tempCanvas.height;
            finalCanvas.height = tempCanvas.width;
            const ctx = finalCanvas.getContext('2d');

            // 执行旋转矩阵：平移到右上角，然后顺时针旋转 90 度
            ctx.translate(finalCanvas.width, 0);
            ctx.rotate(Math.PI / 2);
            // 将白底黑字的图片画上去
            ctx.drawImage(tempCanvas, 0, 0);

            // 4. 导出最终的 JPEG 图片（白底不需要透明度，用 JPEG 更小）
            const finalBase64 = finalCanvas.toDataURL('image/jpeg', 0.9);

            // 5. 模拟上传服务器并回调
            // 实际业务： fetch('/api/upload', { body: finalBase64 }).then(res => ...)
            
            // 使用 sessionStorage 在 H5 跨页面传参
            sessionStorage.setItem('upload_sign_result', finalBase64);
            
            // 返回上一页触发回调
            window.history.back();
        });
    </script>
</body>
</html>
